<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data | Praktikum 6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Input Data Mahasiswa</h2>
        <p class="subtitle">Isi data di bawah ini untuk menambahkan mahasiswa baru</p>

        <form th:action="@{/form}" th:object="${user}" method="post">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" th:field="*{nama}" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="form-group">
                <label>NIM</label>
                <input type="text" th:field="*{nim}" placeholder="Masukkan NIM" required>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin</label>
                <div class="radio-group">
                    <label><input type="radio" th:field="*{jenisKelamin}" value="Laki-laki" required> Laki-laki</label>
                    <label><input type="radio" th:field="*{jenisKelamin}" value="Perempuan"> Perempuan</label>
                </div>
            </div>

            <div class="form-group">
                <label>Alamat</label>
                <textarea th:field="*{alamat}" rows="3" placeholder="Masukkan alamat lengkap" required></textarea>
            </div>

            <button type="submit">Simpan Data Mahasiswa</button>
        </form>

        <a th:href="@{/home}" class="back-link">← Kembali ke Dashboard</a>
    </div>
</div>
</body>
</html>
